services:
  - type: web
    name: medical-ai-api
    env: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --workers 1 --threads 2 

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"

    autoDeploy: true