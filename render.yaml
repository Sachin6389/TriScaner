services:
  - type: web
    name: medical-ai-api
    env: python
    plan: free

    buildCommand: |
      apt-get update && apt-get install -y git-lfs
      git lfs install
      git lfs pull
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --workers 1 --threads 2 --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.10